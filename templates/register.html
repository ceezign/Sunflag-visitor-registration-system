{% extends "layout.html" %}
{% block content %}

<div class="header">
    <h4>Visitor Registration</h4>
</div>

<div class="container py-4">

    <div class="card main-card shadow p-4">

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="alert alert-success text-center">
              {{ messages[0] }}
            </div>
          {% endif %}
        {% endwith %}

        <form action="/add" method="POST" onsubmit="showLoader()">

            <input class="form-control mb-3" type="text" name="visitor_name" placeholder="Full Name" required>

            <textarea class="form-control mb-3" name="full_address" placeholder="Full Address"></textarea>

            <input class="form-control mb-3" type="text" name="tag_no" placeholder="Tag Number">

            <input class="form-control mb-3" type="tel" name="phone_no" placeholder="Phone Number">

            <input class="form-control mb-3" type="text" name="whom_to_see" placeholder="Whom To See">

            <textarea class="form-control mb-3" name="purpose" placeholder="Purpose of Visit"></textarea>

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" name="acknowledged" required>
                <label class="form-check-label small">
                    I confirm the information provided is correct.
                </label>
            </div>

            <button class="btn btn-primary w-100">
                Submit
            </button>

        </form>

    </div>

</div>

{% endblock %}

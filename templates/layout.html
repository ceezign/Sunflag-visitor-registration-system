<!DOCTYPE html>
<html>
<head>
    <title>Sunflag Nig Ltd Visitor System</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #F4F7FA;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Gradient Header */
        .header {
            background: linear-gradient(135deg, #0B3C5D, #145DA0);
            color: white;
            padding: 25px;
            border-radius: 0 0 20px 20px;
            text-align: center;
        }

        .logo-img {
            max-height: 80px;
        }

        .main-card {
            border-radius: 15px;
            border: none;
            animation: fadeIn 0.6s ease-in-out;
        }

        /* Button Styling */
        .btn-primary {
            background-color: #F27A1A;
            border: none;
        }

        .btn-primary:hover {
            background-color: #d96510;
        }

        /* QR Image */
        .qr-img {
            width: 200px;
            max-width: 100%;
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Spinner Overlay */
        #loader {
            display: none;
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            top: 0;
            left: 0;
            z-index: 999;
            justify-content: center;
            align-items: center;
        }

        .spinner-border {
            width: 3rem;
            height: 3rem;
            color: white;
        }
    </style>
</head>

<body>

<div id="loader">
    <div class="spinner-border"></div>
</div>

{% block content %}{% endblock %}

<script>
function showLoader() {
    document.getElementById("loader").style.display = "flex";
}
</script>

</body>
</html>
